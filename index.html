        { id: 'd3_14', homeTeamId: 't14', awayTeamId: 't13', homeScore: 3, awayScore: 0, date: '4 مارس', time: '00:00', stadium: 'الملعب 2', status: 'FINISHED', group: 'D', round: 'ج6 - عودة', details: { scorers: [
          { player: 'طارق', teamId: 't14' },{ player: 'خميس', teamId: 't14' },{ player: 'خميس', teamId: 't14' }
        ] } },
        
        // (تم حذف المباريات الزائدة للمجموعة A من هنا)
      ];

      const KNOCKOUT_MATCHES = [
         { id: 'qf1_1', homeTeamId: 't1', awayTeamId: 't9', stage: 'ربع النهائي', title: 'ربع النهائي 1', date: '9 مارس', time: '22:00', stadium: 'الملعب 1', status: 'FINISHED', homeScore: 2, awayScore: 2, details: { scorers: [{ player: 'احمد مختار', teamId: 't1' },
          { player: 'احمد مختار', teamId: 't1' },{ player: 'اسماعيل رجب', teamId: 't9' },{ player: 'كريم', teamId: 't9' }
         ] } },
        { id: 'qf2_1', homeTeamId: 't12', awayTeamId: 't6', stage: 'ربع النهائي', title: 'ربع النهائي 2', date: '9 مارس', time: '22:00', stadium: 'الملعب 2', status: 'FINISHED', homeScore: 1, awayScore: 2, details: { scorers: [
          { player: 'محمد ايتو', teamId: 't12' },{ player: 'الزوز', teamId: 't6' },{ player: 'تيم', teamId: 't6' }
        ] } },
        { id: 'qf3_1', homeTeamId: 't4', awayTeamId: 't14', stage: 'ربع النهائي', title: 'ربع النهائي 3', date: '9 مارس', time: '22:30', stadium: 'الملعب 1', status: 'FINISHED', homeScore: 1, awayScore: 2, details: { scorers: [
          { player: 'محمد سليمان', teamId: 't4' },{ player: 'احمد', teamId: 't14' },{ player: 'احمد', teamId: 't14' }
        ] } },
        { id: 'qf4_1', homeTeamId: 't3', awayTeamId: 't10', stage: 'ربع النهائي', title: 'ربع النهائي 4', date: '9 مارس', time: '22:30', stadium: 'الملعب 2', status: 'FINISHED', homeScore: 0, awayScore: 2, details: { scorers: [
          { player: 'عبده', teamId: 't10' },{ player: 'عبده', teamId: 't10' }
        ] } },
        { id: 'qf1_2', homeTeamId: 't1', awayTeamId: 't9', stage: 'ربع النهائي', title: 'ربع النهائي 1', date: '9 مارس', time: '22:00', stadium: 'الملعب 1', status: 'FINISHED', homeScore: 3, awayScore: 2, details: { scorers: [
          { player: 'ركلات ترجيحية' }
        ] } },
        { id: 'qf2_2', homeTeamId: 't12', awayTeamId: 't6', stage: 'ربع النهائي', title: 'ربع النهائي 2', date: '9 مارس', time: '22:00', stadium: 'الملعب 2', status: 'FINISHED', homeScore: 1, awayScore: 1, details: { scorers: [
          { player: 'محمد ايتو', teamId: 't12' },{ player: 'بيبا', teamId: 't6' }
        ] } },
        { id: 'qf3_2', homeTeamId: 't4', awayTeamId: 't14', stage: 'ربع النهائي', title: 'ربع النهائي 3', date: '9 مارس', time: '22:30', stadium: 'الملعب 1', status: 'FINISHED', homeScore: 3, awayScore: 0, details: { scorers: [
          { player: 'عمرو', teamId: 't4' },{ player: 'شيكا', teamId: 't4' },{ player: 'شيكا', teamId: 't4' }
        ] } },
        { id: 'qf4_2', homeTeamId: 't3', awayTeamId: 't10', stage: 'ربع النهائي', title: 'ربع النهائي 4', date: '9 مارس', time: '22:30', stadium: 'الملعب 2', status: 'FINISHED', homeScore: 0, awayScore: 4, details: { scorers: [{ player: 'عبده', teamId: 't10' },
          { player: 'عبده', teamId: 't10' },{ player: 'عبده', teamId: 't10' },{ player: 'مصطفى خالد', teamId: 't10' },
        ] } },
        
        // نصف النهائي
        { id: 'sf1', homeTeamId: 't1', awayTeamId: 't10', stage: 'نصف النهائي', title: 'فائز QF2 × فائز QF3', date: '10 مارس', time: '22:00', stadium: 'الملعب 1', status: 'FINISHED', homeScore: 1, awayScore: 3, details: { scorers: [] } },
        { id: 'sf2', homeTeamId: 't4', awayTeamId: 't6', stage: 'نصف النهائي', title: 'فائز QF1 × فائز QF4', date: '10 مارس', time: '22:00', stadium: 'الملعب 2', status: 'FINISHED', homeScore: 3, awayScore: 1, details: { scorers: [] } },
        
        // --- مباراة المركز الثالث (مهمة للاحتفال) ---
        // (غير الحالة لـ FINISHED وحط النتيجة لما تلعب)
        { id: '3rd', homeTeamId: 't1', awayTeamId: 't6', stage: 'المركز الثالث', title: 'تحديد الثالث', date: '10 مارس', time: '22:30', stadium: 'الملعب 2', status: 'SCHEDULED', homeScore: null, awayScore: null, details: { scorers: [] } },

        // --- النهائي (مهم جداً للاحتفال) ---
        // (عندما تنتهي البطولة، غير SCHEDULED إلى FINISHED وضع النتيجة)
        { id: 'f1', homeTeamId: null, awayTeamId: null, stage: 'النهائي', title: 'كأس البطولة', date: '10 مارس', time: '23:00', stadium: 'الملعب الرئيسي', status: 'SCHEDULED', homeScore: null, awayScore: null, details: { scorers: [] } },
      ];

      // ==========================================
      // 3. المنطق (Logic)
      // ==========================================
      const PLAYERS = [];
      let state = { activeTab: 'matches', matchesFilter: 'ALL', searchQuery: '', expandedMatches: new Set(), expandedGroups: new Set() };
      const getTeam = (id) => TEAMS.find(t => t.id === id) || { name: 'لم يحدد', logoColor: 'bg-gray-300' };

      // --- Logic ---
      function calculateStats() {
        TEAMS.forEach(team => { team.played = 0; team.won = 0; team.drawn = 0; team.lost = 0; team.gf = 0; team.ga = 0; team.pts = 0; });
        const allMatches = [...MATCHES, ...KNOCKOUT_MATCHES];
        allMatches.forEach(match => {
          if (match.status !== 'FINISHED' || match.homeScore === null || match.awayScore === null) return;
          if (match.group) { // حساب النقاط للمجموعات فقط
              const h = TEAMS.find(t => t.id === match.homeTeamId);
              const a = TEAMS.find(t => t.id === match.awayTeamId);
              if (!h || !a) return;
              const hs = parseInt(match.homeScore), as = parseInt(match.awayScore);
              h.played++; a.played++; h.gf += hs; h.ga += as; a.gf += as; a.ga += hs;
              if (hs > as) { h.won++; h.pts += 3; a.lost++; }
              else if (hs < as) { a.won++; a.pts += 3; h.lost++; }
              else { h.drawn++; h.pts++; a.drawn++; a.pts++; }
          }
        });
      }

      function calculateAutoScorers() {
        PLAYERS.length = 0;
        const playersMap = {};
        const extract = (matchList) => {
            matchList.forEach(m => {
                if (m.details && m.details.scorers) {
                    m.details.scorers.forEach(s => {
                        const key = s.player + '-' + s.teamId;
                        if (!playersMap[key]) {
                            playersMap[key] = { id: key, name: s.player, teamId: s.teamId, goals: 0 };
                        }
                        playersMap[key].goals += 1;
                    });
                }
            });
        };
        extract(MATCHES);
        extract(KNOCKOUT_MATCHES);
        Object.values(playersMap).forEach(p => PLAYERS.push(p));
      }

      // --- دالة الاحتفال (المسؤولة عن ظهور المراكز) ---
      function checkAndRenderChampions() {
        const finalMatch = KNOCKOUT_MATCHES.find(m => m.id === 'f1');
        const thirdPlaceMatch = KNOCKOUT_MATCHES.find(m => m.id === '3rd');

        // الشرط: لازم النهائي يكون FINISHED والنتيجة مكتوبة
        if (!finalMatch || finalMatch.status !== 'FINISHED' || finalMatch.homeScore === null) return;

        let firstId, secondId, thirdId;

        // حساب الأول والثاني
        if (parseInt(finalMatch.homeScore) > parseInt(finalMatch.awayScore)) {
            firstId = finalMatch.homeTeamId;
            secondId = finalMatch.awayTeamId;
        } else {
            firstId = finalMatch.awayTeamId;
            secondId = finalMatch.homeTeamId;
        }

        // حساب الثالث (لو الماتش اتلعب)
        if (thirdPlaceMatch && thirdPlaceMatch.status === 'FINISHED' && thirdPlaceMatch.homeScore !== null) {
             if (parseInt(thirdPlaceMatch.homeScore) > parseInt(thirdPlaceMatch.awayScore)) {
                thirdId = thirdPlaceMatch.homeTeamId;
            } else {
                thirdId = thirdPlaceMatch.awayTeamId;
            }
        }

        const t1 = getTeam(firstId);
        const t2 = getTeam(secondId);
        const t3 = thirdId ? getTeam(thirdId) : null;

        const container = document.getElementById('app-content');
        const celebrationHTML = `
          <div class="relative mb-8 pt-6 text-center animate-fadeIn">
            <!-- خلفية الكونفيتي -->
            <div class="absolute inset-0 overflow-hidden pointer-events-none" style="height: 350px; top: -50px; z-index:0;">
                ${Array(30).fill(0).map(() => `<div class="confetti" style="left: ${Math.random()*100}%; animation-delay: ${Math.random()*2}s; background-color: ${['#FFD700', '#FF0000', '#00FF00', '#0000FF'][Math.floor(Math.random()*4)]}"></div>`).join('')}
            </div>

            <h2 class="text-2xl font-black text-navy-900 mb-8 relative z-10 drop-shadow-md">🏆 الفائزين ببطولة رجب 🏆</h2>
            
            <div class="flex justify-center items-end gap-2 sm:gap-4 px-2 relative z-10">
                
                <!-- المركز الثاني -->
                <div class="silver-card w-1/3 p-3 rounded-t-xl rounded-b-lg flex flex-col items-center justify-end h-32 relative order-1">
                    <div class="absolute -top-3 bg-gray-400 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md border-2 border-white">2</div>
                    <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center font-bold text-gray-500 text-xl shadow-md mb-2 ring-2 ring-gray-100">${t2.name.charAt(0)}</div>
                    <div class="font-bold text-navy-900 text-xs sm:text-sm text-center leading-tight line-clamp-2">${t2.name}</div>
                    <div class="text-[9px] text-gray-600 font-bold mt-1 uppercase tracking-wider">الوصيف</div>
                </div>

                <!-- المركز الأول -->
                <div class="champion-card w-1/3 p-3 rounded-t-xl rounded-b-lg flex flex-col items-center justify-end h-44 relative order-2 z-20 -translate-y-4">
                    <div class="absolute -top-8 text-5xl drop-shadow-md animate-bounce">👑</div>
                    <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center font-bold text-yellow-600 text-3xl shadow-lg mb-3 border-4 border-yellow-200">${t1.name.charAt(0)}</div>
                    <div class="font-black text-navy-900 text-sm sm:text-base text-center leading-tight line-clamp-2">${t1.name}</div>
                    <div class="text-[10px] text-yellow-900 font-black mt-2 bg-white/40 px-3 py-1 rounded-full">البطل</div>
                </div>

                <!-- المركز الثالث -->
                ${t3 ? `
                <div class="bronze-card w-1/3 p-3 rounded-t-xl rounded-b-lg flex flex-col items-center justify-end h-28 relative order-3">
                    <div class="absolute -top-3 bg-[#CD7F32] text-white text-xs font-bold px-3 py-1 rounded-full shadow-md border-2 border-white">3</div>
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center font-bold text-[#A0522D] text-lg shadow-md mb-2 ring-2 ring-orange-100">${t3.name.charAt(0)}</div>
                    <div class="font-bold text-navy-900 text-xs sm:text-sm text-center leading-tight line-clamp-2">${t3.name}</div>
                    <div class="text-[9px] text-[#5c3a2e] font-bold mt-1">البرونزية</div>
                </div>
                ` : ''}
            </div>
          </div>
        `;
        container.insertAdjacentHTML('afterbegin', celebrationHTML);
      }

      function init() { 
        calculateStats(); 
        calculateAutoScorers(); 
        renderNav(); 
        renderContent(); 
        checkAndRenderChampions(); // <--- استدعاء دالة الاحتفال
        updateIcons(); 
      }
      
      function updateIcons() { 
        setTimeout(() => { if (window.lucide && window.lucide.createIcons) window.lucide.createIcons(); }, 50); 
      }
      
      function renderNav() {
        const tabs = [ { id: 'standings', label: 'الترتيب', icon: 'shield' }, { id: 'matches', label: 'المباريات', icon: 'calendar-days' }, { id: 'scorers', label: 'الهدافين', icon: 'users' } ];
        const navContainer = document.getElementById('nav-tabs');
        if(navContainer) {
          navContainer.innerHTML = tabs.map(t => `<button onclick="setTab('${t.id}')" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all ${state.activeTab === t.id ? 'bg-white text-navy-900 shadow-sm' : 'text-gray-400 hover:text-white'}"><i data-lucide="${t.icon}" class="w-4 h-4 ${state.activeTab === t.id ? 'text-gold-400' : ''}"></i><span>${t.label}</span></button>`).join('');
        }
      }

      function renderContent() {
        const c = document.getElementById('app-content');
        if(!c) return;
        c.className = "max-w-md mx-auto px-4 py-6 space-y-4 fade-in";
        if (state.activeTab === 'matches') renderMatches(c);
        else if (state.activeTab === 'standings') renderStandings(c);
        else if (state.activeTab === 'scorers') renderScorers(c);
      }

      window.setTab = (t) => { state.activeTab = t; renderNav(); renderContent(); updateIcons(); };
      window.setMatchFilter = (f) => { state.matchesFilter = f; renderContent(); updateIcons(); };
      window.setSearch = (q) => { state.searchQuery = q; renderContent(); updateIcons(); };
      window.toggleMatchDetails = (id) => { state.expandedMatches.has(id) ? state.expandedMatches.delete(id) : state.expandedMatches.add(id); renderContent(); updateIcons(); };
      window.toggleGroupMatches = (g) => { 
        if (state.expandedGroups.has(g)) state.expandedGroups.delete(g);
        else state.expandedGroups.add(g);
        renderContent(); updateIcons(); 
      };

      function renderMatches(c) {
        // الفلاتر الجديدة
        const filters = [
            { id: 'ALL', label: 'الكل' },
            { id: 'UPCOMING', label: 'قادمة' },
            { id: 'FINISHED', label: 'منتهية' }
        ];

        // تصفية المباريات
        let allMatches = [...MATCHES, ...KNOCKOUT_MATCHES]; // دمج الكل في قائمة واحدة للعرض
        let list = allMatches.filter(m => {
            const h = getTeam(m.homeTeamId); const a = getTeam(m.awayTeamId);
            // بحث
            if (state.searchQuery && !h.name.includes(state.searchQuery) && !a.name.includes(state.searchQuery)) return false;
            // فلتر
            if (state.matchesFilter === 'ALL') return true;
            if (state.matchesFilter === 'FINISHED') return m.status === 'FINISHED';
            if (state.matchesFilter === 'UPCOMING') return m.status === 'SCHEDULED' || m.status === 'LIVE';
            return true;
        });

        // HTML الفلاتر
        const filterHtml = `<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide mb-4">${filters.map(f => `<button onclick="setMatchFilter('${f.id}')" class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap ${state.matchesFilter === f.id ? 'bg-navy-900 text-gold-400 shadow-md' : 'bg-white text-gray-500 border border-gray-200'}">${f.label}</button>`).join('')}</div>`;
        
        let html = `
            <div class="relative mb-4">
                <input type="text" placeholder="بحث عن فريق..." class="w-full bg-white border border-gray-300 rounded-lg py-2.5 px-4 text-sm" oninput="window.setSearch(this.value)" value="${state.searchQuery}">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
            </div>
            ${filterHtml}
        `;

        if (list.length > 0) {
            html += list.map(m => renderMatchCard(m)).join('');
        } else {
            html += `<div class="text-center py-10 text-gray-400 text-sm bg-white rounded-lg">لا توجد مباريات مطابقة</div>`;
        }
        c.innerHTML = html;
      }

      function renderMatchCard(m, isKo=false) {
        const h = getTeam(m.homeTeamId), a = getTeam(m.awayTeamId), exp = state.expandedMatches.has(m.id);
        const finished = m.status === 'FINISHED';
        let det = '';
        if (exp) {
          det = `<div class="border-t border-gray-100 bg-gray-50/80 p-4 text-sm"><div class="flex justify-between items-start">
            <div class="flex-1 flex flex-col items-center gap-1">${m.details.scorers.filter(s=>s.teamId===m.homeTeamId).map(s=>`<div><span class="text-xs font-bold">${s.player}</span> ⚽</div>`).join('') || '-'}</div>
            <div class="px-3"><span class="text-[9px] text-gray-400 bg-white px-2 py-0.5 rounded-full border">الأهداف</span></div>
            <div class="flex-1 flex flex-col items-center gap-1">${m.details.scorers.filter(s=>s.teamId===m.awayTeamId).map(s=>`<div>⚽ <span class="text-xs font-bold">${s.player}</span></div>`).join('') || '-'}</div>
          </div></div>`;
        }
        return `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4 cursor-pointer ${m.stage ? 'border-t-4 border-t-gold-400' : ''}" onclick="toggleMatchDetails('${m.id}')">
          <div class="bg-gray-50 px-4 py-2 flex justify-between text-xs text-gray-500 border-b">
            <div class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i><span>${m.date}</span></div>
            <span>${m.title || (m.group + ' - ' + m.round)}</span>
          </div>
          <div class="p-4 flex items-center justify-between">
             <div class="flex flex-col items-center flex-1"><div class="w-10 h-10 rounded-full mb-1 flex items-center justify-center text-white ${h.logoColor}">${h.name.charAt(0)}</div><span class="text-xs font-bold text-center">${h.name}</span></div>
             <div class="flex flex-col items-center w-20">
               <div class="text-xl font-black text-navy-900">${finished ? `${m.homeScore} - ${m.awayScore}` : 'VS'}</div>
               ${!finished ? `<span class="text-[10px] bg-gold-100 px-2 rounded mt-1">${m.time}</span>` : ''}
             </div>
             <div class="flex flex-col items-center flex-1"><div class="w-10 h-10 rounded-full mb-1 flex items-center justify-center text-white ${a.logoColor}">${a.name.charAt(0)}</div><span class="text-xs font-bold text-center">${a.name}</span></div>
          </div>
          ${det}
          <div class="px-4 py-1 bg-gray-50 border-t text-[10px] text-center text-gray-500">${m.stadium}</div>
        </div>`;
      }

      function renderStandings(c) {
        c.innerHTML = ['A','B','C','D'].map(g => {
          const rows = TEAMS.filter(t=>t.group===g).sort((a,b)=>b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga)).map((t,i)=>`
            <tr class="border-b border-gray-50 last:border-0 hover:bg-gray-50">
              <td class="p-2 text-right flex items-center gap-2">
                <span class="w-4 text-xs ${i<2?'text-green-600 font-bold':'text-gray-400'}">${i+1}</span>
                <span class="text-xs font-bold truncate">${t.name}</span>
              </td>
              <td class="p-2">${t.played}</td><td class="p-2">${t.won}</td><td class="p-2">${t.drawn}</td><td class="p-2">${t.lost}</td><td class="p-2 ltr" dir="ltr">${t.gf-t.ga}</td><td class="p-2 font-bold bg-gray-50">${t.pts}</td>
            </tr>`).join('');
          
          const isExpanded = state.expandedGroups.has(g);
          const groupMatches = MATCHES.filter(m => m.group === g);

          return `<div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-4 overflow-hidden">
            <div class="bg-navy-900 px-4 py-2 text-white font-bold text-sm flex justify-between cursor-pointer" onclick="toggleGroupMatches('${g}')">
               <div><span>المجموعة ${g}</span> <span class="text-[10px] bg-white/20 px-2 rounded">تأهل 2</span></div>
               <div class="flex items-center gap-1 text-[10px] text-gold-400"><span>${isExpanded ? 'إخفاء' : 'المباريات'}</span><i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-3 h-3"></i></div>
            </div>
            <table class="w-full text-center text-xs text-gray-600"><thead class="bg-gray-50"><tr><th class="p-2 text-right">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>+/-</th><th>ن</th></tr></thead><tbody>${rows}</tbody></table>
            ${isExpanded ? `<div class="bg-gray-50 border-t border-gray-200 p-3"><div class="space-y-2">${groupMatches.map(m => renderMatchCard(m)).join('')}</div></div>` : ''}
          </div>`;
        }).join('');
      }

      function renderScorers(c) {
        const sorted = [...PLAYERS].sort((a,b) => b.goals - a.goals);
        const list = sorted.map((p, i) => `
        <div class="flex items-center justify-between p-3 border-b border-gray-100 hover:bg-gray-50">
           <div class="flex items-center gap-3">
              <span class="w-6 h-6 flex items-center justify-center bg-gray-100 rounded-full text-xs font-bold text-gray-500">${i+1}</span>
              <div>
                 <div class="font-bold text-sm text-navy-900">${p.name}</div>
                 <div class="text-[10px] text-gray-500">${getTeam(p.teamId).name}</div>
              </div>
           </div>
           <div class="font-bold text-lg text-gold-500">${p.goals}</div>
        </div>`).join('');

        c.innerHTML = `
          <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div class="bg-navy-900 p-4 text-white text-center font-bold">قائمة الهدافين</div>
            <div>${list || '<div class="p-4 text-center text-gray-400 text-sm">لا يوجد أهداف مسجلة بعد</div>'}</div>
          </div>
        `;
      }

      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
